services:
  postgres:
    image: postgres:16-alpine
    container_name: wplus-postgres
    environment:
      POSTGRES_USER: wplus
      POSTGRES_PASSWORD: wplus_secret
      POSTGRES_DB: wplus
    ports:
      - "5432:5432"
    volumes:
      - wplus_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wplus"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wplus-redis
    ports:
      - "6379:6379"
    volumes:
      - wplus_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wplus_pg_data:
  wplus_redis_data:
