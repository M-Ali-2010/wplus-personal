name: wplus
description: "W+ — Creator Economy Platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  flutter_riverpod: ^2.6.1
  google_fonts: ^6.2.1
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  dio: ^5.7.0
  socket_io_client: ^3.0.2
  uuid: ^4.5.1
  shared_preferences: ^2.3.5
  flutter_launcher_icons: ^0.14.4
  livekit_client: ^2.3.1
  lottie: ^3.3.1
  permission_handler: ^11.4.0
  camera: ^0.11.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter_launcher_icons:

  android: true

  ios: true

  image_path: "assets/img.png"

  remove_alpha_ios: true
flutter:
  uses-material-design: true
